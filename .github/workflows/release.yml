name: Release

on:
  push:
    branches: [ "main" ]

jobs:
  release:
    name: "Semantic release"
    runs-on: ubuntu-latest
    # Only runs if CI and Security passed (enforced via GitHub branch protection rules)

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node (for semantic-release)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install semantic-release
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
